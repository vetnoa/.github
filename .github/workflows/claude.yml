name: Claude Code (reusable)
on:
  workflow_call: {}

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: vetnoa/.github/actions/inject-writing-rules@main

      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.LITERATURE_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowed-tools "Bash(gh api:*),WebFetch,Bash(curl:*),mcp__notionApi" --mcp-config '{"mcpServers":{"notionApi":{"command":"npx","args":["-y","@notionhq/notion-mcp-server"],"env":{"NOTION_TOKEN":"${{ secrets.NOTION_API_KEY }}"}}}}'
