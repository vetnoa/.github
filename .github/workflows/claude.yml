name: Claude Code (reusable)
on:
  workflow_call: {}

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check out literature (read-only reference)
        if: |
          github.repository == 'vetnoa/vetnoa' && (
            contains(github.event.issue.labels.*.name, 'needs-literature') ||
            contains(github.event.pull_request.labels.*.name, 'needs-literature')
          )
        uses: actions/checkout@v4
        with:
          repository: vetnoa/literature
          token: ${{ secrets.LITERATURE_TOKEN }}
          path: literature
          fetch-depth: 1

      - uses: vetnoa/.github/actions/inject-writing-rules@main

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowed-tools "Bash(gh api:*),WebFetch,Bash(curl:*),mcp__notionApi" --mcp-config '{"mcpServers":{"notionApi":{"command":"npx","args":["-y","@notionhq/notion-mcp-server"],"env":{"NOTION_TOKEN":"${{ secrets.NOTION_API_KEY }}"}}}}'
